blueprint:
  name: "AMP - Discord Server Status Notifications"
  description: "Send Discord notifications for AMP server status changes and player count updates. Supports webhook triggers, player tracking, message creation, updates, and deletion with quiet time scheduling."
  domain: automation
  input:
    entity_prefix:
      name: "Entity Prefix"
      description: "Prefix used for all entity IDs (e.g., 'palworld' will look for sensor.palworld_active_users, input_text.palworld_webhookurl, etc.)"
      selector:
        text:
    webhook_id:
      name: "Webhook ID"
      description: "The webhook ID for receiving AMP server events (e.g., 'Palworld-hvcYP2nCoPt587XBtHy')"
      selector:
        text:

trigger_variables:
  prefix: !input entity_prefix

trigger:
  - platform: webhook
    webhook_id: !input webhook_id
    allowed_methods:
      - POST
      - PUT
    local_only: false
    id: webhook_event
    
  - platform: template
    value_template: >-
      {{ states('sensor.' ~ prefix ~ '_active_users') is not none }}
    id: active_users_change

  - platform: template
    value_template: >-
      {{ states('sensor.' ~ prefix ~ '_app_state') is not none }}
    id: status_change
    
variables:
  entity_prefix: !input entity_prefix
  active_users_sensor: "sensor.{{ entity_prefix }}_active_users"
  app_state_sensor: "sensor.{{ entity_prefix }}_app_state"
  players_sensor: "input_text.{{ entity_prefix }}_players"
  max_players_sensor: "sensor.{{ entity_prefix }}_max_active_users"
  wanip_sensor: "sensor.wanip"
  webhook_url_entity: "input_text.{{ entity_prefix }}_webhookurl"
  port_entity: "input_text.{{ entity_prefix }}_port"
  password_entity: "input_text.{{ entity_prefix }}_password"
  message_entity: "input_text.{{ entity_prefix }}_message"
  last_webhook_id_entity: "input_text.{{ entity_prefix }}_lastwebhookid"
  last_webhook_timestamp_entity: "input_datetime.{{ entity_prefix }}_lastwebhooktimestamp"
  webhook_json: "{{ trigger.json | default({}) }}"
  event_type: "{{ webhook_json.get('event', '') }}"

condition:
  - condition: state
    entity_id: schedule.discord_quiet_time
    state: "off"

action:
  # Process webhook events
  - alias: "Handle webhook events"
    if:
      - condition: trigger
        id: webhook_event
    then:
      - alias: "Update message based on event type"
        choose:
          - conditions:
              - alias: "Status Change event"
                condition: template
                value_template: "{{ event_type == 'Status_Change' }}"
            sequence:
              - action: input_text.set_value
                data:
                  value: "Last event: The server's status has changed"
                target:
                  entity_id: "{{ message_entity }}"
          - conditions:
              - alias: "Player Joined event"
                condition: template
                value_template: "{{ event_type == 'Player_Joined' }}"
            sequence:
              - action: input_text.set_value
                data:
                  value: "{{ 'Last event: ' ~ webhook_json.get('player_joined_name', 'Unknown') ~ ' joined the server!' }}"
                target:
                  entity_id: "{{ message_entity }}"
          - conditions:
              - alias: "Player Left event"
                condition: template
                value_template: "{{ event_type == 'Player_Left' }}"
            sequence:
              - action: input_text.set_value
                data:
                  value: "{{ 'Last event: ' ~ webhook_json.get('player_left_name', 'Unknown') ~ ' left the server' }}"
                target:
                  entity_id: "{{ message_entity }}"
      
      - alias: "Add players to string when they join"
        if:
          - alias: "A new player joined"
            condition: template
            value_template: "{{ webhook_json.get('player_joined_name', '') != '' }}"
        then:
          - action: input_text.set_value
            data:
              value: >-
                {{
                ((states(players_sensor) | default('')) | regex_replace(webhook_json.get('player_joined_name', '') ~ ',', '', True)) 
                ~ webhook_json.get('player_joined_name', '') ~ ','
                }}
            target:
              entity_id: "{{ players_sensor }}"
      
      - alias: "Remove players from string when they leave"
        if:
          - alias: "A player left"
            condition: template
            value_template: "{{ webhook_json.get('player_left_name', '') != '' }}"
        then:
          - action: input_text.set_value
            data:
              value: "{{ (states(players_sensor) | default('')) | regex_replace(webhook_json.get('player_left_name', '') ~ ',', '', True) }}"
            target:
              entity_id: "{{ players_sensor }}"
      
      - alias: "Reset player string when no players online"
        if:
          - alias: "No players left"
            condition: template
            value_template: "{{ webhook_json.get('online_player_count', '0') == '0' }}"
        then:
          - action: input_text.set_value
            data:
              value: ""
            target:
              entity_id: "{{ players_sensor }}"

  - alias: "Check if creating new or updating existing discord message"
    if:
      - alias: "There is a webhook ID"
        condition: template
        value_template: "{{ (states(last_webhook_id_entity) | default('')) != '' }}"
      - condition: or
        conditions:
          - alias: "Update interval has not passed since last webhook"
            condition: template
            value_template: >-
              {% set last_time = as_timestamp(states(last_webhook_timestamp_entity)) | default(0) | int %}
              {{ (as_timestamp(now()) - last_time) <= 1800 }}
          - alias: "Event trigger is Status Change"
            condition: template
            value_template: "{{ event_type == 'Status_Change' or trigger.id == 'status_change' }}"
    then:
      - alias: "Update discord message"
        action: rest_command.discord_server_status_notification_update
        data:
          webhook_url: "{{ states(webhook_url_entity) }}"
          ip_address: "{{ states(wanip_sensor) }}"
          server_status: "{{ webhook_json.get('server_status') or states(app_state_sensor) }}"
          online_player_count: "{{ webhook_json.get('online_player_count') or states(players_sensor) }}"
          max_player_count: "{{ webhook_json.get('max_player_count') or states(max_players_sensor) }}"
          online_player_names: "{{ states(players_sensor) }}"
          message: "{{ states(message_entity) | default('') }}"
          port: "{{ states(port_entity) }}"
          password: "{{ states(password_entity) }}"
    else:
      - alias: "Delete if there's a previous webhook"
        if:
          - alias: "There is a webhook ID"
            condition: template
            value_template: "{{ (states(last_webhook_id_entity) | default('')) != '' }}"
        then:
          - action: rest_command.discord_server_status_notification_delete
            data:
              webhook_url: "{{ states(webhook_url_entity) }}"
              webhook_id: "{{ states(last_webhook_id_entity) }}"
      - alias: "Create new discord message"
        action: rest_command.discord_server_status_notification_create
        data:
          webhook_url: "{{ states(webhook_url_entity) }}"
          ip_address: "{{ states(wanip_sensor) }}"
          server_status: "{{ webhook_json.get('server_status') or states(app_state_sensor) }}"
          online_player_count: "{{ webhook_json.get('online_player_count') or states(players_sensor) }}"
          max_player_count: "{{ webhook_json.get('max_player_count') or states(max_players_sensor) }}"
          online_player_names: "{{ states(players_sensor) }}"
          message: "{{ states(message_entity) | default('') }}"
          port: "{{ states(port_entity) }}"
          password: "{{ states(password_entity) }}"
        response_variable: discord_response
      - alias: "Handle successful responses"
        if:
          - condition: template
            value_template: "{{ discord_response['status'] == 200 }}"
            alias: Successful Reply
        then:
          - action: input_datetime.set_datetime
            data:
              datetime: "{{ now() }}"
            target:
              entity_id: "{{ last_webhook_timestamp_entity }}"
          - action: input_text.set_value
            data:
              value: "{{ discord_response['content']['id'] }}"
            target:
              entity_id: "{{ last_webhook_id_entity }}"

mode: single
